services:
  - type: web
    name: wiki-html-transform-api
    runtime: rust
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: cargo build --release --features web --bin wikipedia-article-transform-web
    startCommand: ./target/release/wikipedia-article-transform-web
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 10000
